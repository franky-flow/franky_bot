joy_node:
  ros__parameters:
    device_id: 0
    deadzone: 0.05
    autorepeat_rate: 50.0  # Aumentado de 20 a 50 Hz para comandos más frecuentes
    publish_stamped_twist: true

teleop_node:
  ros__parameters:
    
    axis_linear:  # Left thumb stick vertical
      x: 1
    scale_linear:
      x: 0.7
    scale_linear_turbo:
      x: 1.2

    axis_angular:  # Left thumb stick horizontal
      yaw: 0
    scale_angular:
      yaw: 3.0  # Aumentado de 1.5 para giros más efectivos
    scale_angular_turbo:
      yaw: 4.0  # Aumentado de 2.0

    publish_stamped_twist: true
    require_enable_button: true
    enable_button: 5  # RB
    enable_turbo_button: 4  # LB